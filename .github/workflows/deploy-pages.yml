name: Deploy Astro to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          SITE_URL: https://dimpemekug.com
          SITE_BASE: /
          PUBLIC_SOCIAL_GITHUB: ${{ secrets.PUBLIC_SOCIAL_GITHUB }}
          PUBLIC_SOCIAL_X: ${{ secrets.PUBLIC_SOCIAL_X }}
          PUBLIC_SOCIAL_LINKEDIN: ${{ secrets.PUBLIC_SOCIAL_LINKEDIN }}
          PUBLIC_SOCIAL_EMAIL: ${{ secrets.PUBLIC_SOCIAL_EMAIL }}
          PUBLIC_EDIT_POST_URL: ${{ secrets.PUBLIC_EDIT_POST_URL }}
          PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.PUBLIC_GOOGLE_SITE_VERIFICATION }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
